services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - DATABASE_URL=postgresql://churn:churnpass@db:5432/churndb
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=churn
      - POSTGRES_PASSWORD=churnpass
      - POSTGRES_DB=churndb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: